services:
  termrelay:
    image: ${TERMRELAY_IMAGE}
    restart: unless-stopped
    command:
      - --listen
      - 0.0.0.0:8080
      - --auth-token-file
      - /run/secrets/termrelay_auth_token
      - --daemon-registry
      - /run/secrets/termrelay_daemons
    secrets:
      - termrelay_auth_token
      - termrelay_daemons
    expose:
      - "8080"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      - termrelay
    environment:
      TERMRELAY_DOMAIN: "${TERMRELAY_DOMAIN:?TERMRELAY_DOMAIN must be set for public Caddy deployment}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

secrets:
  termrelay_auth_token:
    file: "${TERMRELAY_AUTH_TOKEN_FILE:?TERMRELAY_AUTH_TOKEN_FILE must point to a token file for public Caddy deployment}"
  termrelay_daemons:
    file: "${TERMRELAY_DAEMON_REGISTRY_FILE:?TERMRELAY_DAEMON_REGISTRY_FILE must point to trusted daemon registry JSON}"

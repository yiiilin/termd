services:
  termrelay:
    image: ${TERMRELAY_IMAGE}
    restart: unless-stopped
    command:
      - --listen
      - 0.0.0.0:8080
      - --setup-token-file
      - /run/secrets/termrelay_setup_token
      - --daemon-registry
      - /data/daemon-registry.json
    secrets:
      - termrelay_setup_token
    volumes:
      - termrelay_state:/data
    expose:
      - "8080"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      - termrelay
    environment:
      TERMRELAY_DOMAIN: "${TERMRELAY_DOMAIN:?TERMRELAY_DOMAIN must be set for public Caddy deployment}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  termrelay_state:

secrets:
  termrelay_setup_token:
    file: "${TERMRELAY_SETUP_TOKEN_FILE:?TERMRELAY_SETUP_TOKEN_FILE must point to the relay setup token file}"

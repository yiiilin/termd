name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

env:
  STATIC_TARGET: x86_64-unknown-linux-musl

jobs:
  validate:
    name: validate release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches workspace versions
        run: |
          set -euo pipefail
          python3 - "${GITHUB_REF_NAME}" <<'PY'
          import json
          import pathlib
          import re
          import sys
          import tomllib

          tag = sys.argv[1]
          if not re.fullmatch(r"\d+\.\d+\.\d+", tag):
              raise SystemExit(f"tag {tag!r} must be a plain semver version such as 0.1.0")

          manifests = [
              "proto/Cargo.toml",
              "termd/Cargo.toml",
              "termctl/Cargo.toml",
              "termrelay/Cargo.toml",
              "termweb/Cargo.toml",
          ]
          root = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          workspace_version = root["workspace"]["package"]["version"]

          def manifest_version(data):
              version = data["package"]["version"]
              if isinstance(version, str):
                  return version
              if isinstance(version, dict) and version.get("workspace") is True:
                  return workspace_version
              raise SystemExit(f"unsupported package.version shape: {version!r}")

          mismatches = []
          for manifest in manifests:
              data = tomllib.loads(pathlib.Path(manifest).read_text())
              version = manifest_version(data)
              if version != tag:
                  mismatches.append(f"{manifest}: {version}")

          package_json = pathlib.Path("termui/frontend/package.json")
          package_data = json.loads(package_json.read_text())
          if package_data.get("version") != tag:
              mismatches.append(f"{package_json}: {package_data.get('version')}")

          package_lock = pathlib.Path("termui/frontend/package-lock.json")
          lock_data = json.loads(package_lock.read_text())
          if lock_data.get("version") != tag:
              mismatches.append(f"{package_lock}: {lock_data.get('version')}")
          root_package = lock_data.get("packages", {}).get("", {})
          if root_package.get("version") != tag:
              mismatches.append(f"{package_lock} packages['']: {root_package.get('version')}")

          if mismatches:
              raise SystemExit(
                  "tag/version mismatch:\n" + "\n".join(f"- {line}" for line in mismatches)
              )

          print(f"validated release tag {tag}")
          PY

      - name: Validate release notes
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          trap 'rm -f "$notes_file"' EXIT
          ./scripts/release-notes.sh "${GITHUB_REF_NAME}" > "$notes_file"
          placeholder_text="请在 scripts/release-notes.sh 中补充此版本的功能、修复和兼容性说明。"
          if ! grep -q "用户可见变化" "$notes_file"; then
            printf 'release notes for %s must include user-visible changes\n' "${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if grep -Fq "$placeholder_text" "$notes_file"; then
            printf 'release notes for %s still contain placeholder text\n' "${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  package:
    name: build release assets
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.STATIC_TARGET }}

      - name: Install static linker tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: termui/frontend/package-lock.json

      - name: Build embedded Web assets
        run: |
          set -euo pipefail
          cd termui/frontend
          npm ci
          npm run build

      - name: Build release archives
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          out_dir="dist/release"
          mkdir -p "$out_dir"

          assert_static_binary() {
            local binary_path="$1"
            local file_output
            file_output="$(file "$binary_path")"
            printf '%s\n' "$file_output"
            if ! printf '%s\n' "$file_output" | grep -Eq 'static-pie linked|statically linked'; then
              printf 'release binary is not statically linked: %s\n' "$binary_path" >&2
              exit 1
            fi
            if ldd "$binary_path" 2>&1 | grep -Eq '=>|ld-linux|libc\.so'; then
              printf 'release binary unexpectedly has dynamic dependencies: %s\n' "$binary_path" >&2
              exit 1
            fi
          }

          build_archive() {
            local package="$1"
            local binary="$2"
            cargo build --release --locked --target "$STATIC_TARGET" -p "$package" --bin "$binary"
            local binary_path="target/${STATIC_TARGET}/release/${binary}"
            strip "$binary_path"
            assert_static_binary "$binary_path"
            local archive="$out_dir/${binary}-${tag}-linux-amd64.tar.gz"
            tar -C "target/${STATIC_TARGET}/release" -czf "$archive" "$binary"
          }

          build_archive termd termd
          build_archive termrelay termrelay
          build_archive termctl termctl

          (
            cd "$out_dir"
            sha256sum *.tar.gz > checksums.txt
          )

          ls -lah "$out_dir"

      - name: Render installer assets
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          python3 - "$tag" "$repo" <<'PY'
          import pathlib
          import stat
          import sys

          tag = sys.argv[1]
          repo = sys.argv[2]
          supervisor_version = pathlib.Path("SUPERVISOR_VERSION").read_text().strip()
          if not supervisor_version:
              raise SystemExit("SUPERVISOR_VERSION is empty")
          out_dir = pathlib.Path("dist/release")
          scripts = [
              pathlib.Path("scripts/install-termctl.sh"),
              pathlib.Path("scripts/install-termd.sh"),
              pathlib.Path("scripts/install-termrelay.sh"),
          ]
          common_replacements = {
              'REPO="${TERMD_GITHUB_REPO:-${GITHUB_REPOSITORY:-}}"': 'REPO="${TERMD_GITHUB_REPO:-' + repo + '}"',
              'VERSION="${TERMD_VERSION:-}"': 'VERSION="${TERMD_VERSION:-' + tag + '}"',
          }

          for src in scripts:
              text = src.read_text()
              replacements = dict(common_replacements)
              if src.name == "install-termd.sh":
                  replacements['REQUIRED_SUPERVISOR_VERSION="${TERMD_REQUIRED_SUPERVISOR_VERSION:-}"'] = (
                      'REQUIRED_SUPERVISOR_VERSION="${TERMD_REQUIRED_SUPERVISOR_VERSION:-'
                      + supervisor_version
                      + '}"'
                  )
              for old, new in replacements.items():
                  if old not in text:
                      raise SystemExit(f"{src} did not contain expected assignment: {old}")
                  text = text.replace(old, new, 1)
              dest = out_dir / src.name
              dest.write_text(text)
              dest.chmod(dest.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
          PY

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          ./scripts/release-notes.sh "$tag" > "$notes_file"
          placeholder_text="请在 scripts/release-notes.sh 中补充此版本的功能、修复和兼容性说明。"
          if ! grep -q "用户可见变化" "$notes_file"; then
            printf 'release notes for %s must include user-visible changes\n' "$tag" >&2
            exit 1
          fi
          if grep -Fq "$placeholder_text" "$notes_file"; then
            printf 'release notes for %s still contain placeholder text\n' "$tag" >&2
            exit 1
          fi
          cd dist/release

          files=(*.tar.gz checksums.txt install-*.sh)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --notes-file "$notes_file"
          fi

  images:
    name: build and push images
    needs: [validate, package]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: termd
            dockerfile: docker/termd.Dockerfile
          - component: termrelay
            dockerfile: docker/termrelay.Dockerfile
          - component: termctl
            dockerfile: docker/termctl.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: image_owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ steps.image_owner.outputs.value }}/${{ matrix.component }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

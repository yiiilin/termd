name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: validate release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches workspace versions
        run: |
          set -euo pipefail
          python3 - "${GITHUB_REF_NAME}" <<'PY'
          import json
          import pathlib
          import re
          import sys
          import tomllib

          tag = sys.argv[1]
          if not re.fullmatch(r"\d+\.\d+\.\d+", tag):
              raise SystemExit(f"tag {tag!r} must be a plain semver version such as 0.1.0")

          manifests = [
              "proto/Cargo.toml",
              "termd/Cargo.toml",
              "termctl/Cargo.toml",
              "terminstall/Cargo.toml",
              "termrelay/Cargo.toml",
              "termweb/Cargo.toml",
          ]
          root = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          workspace_version = root["workspace"]["package"]["version"]

          def manifest_version(data):
              version = data["package"]["version"]
              if isinstance(version, str):
                  return version
              if isinstance(version, dict) and version.get("workspace") is True:
                  return workspace_version
              raise SystemExit(f"unsupported package.version shape: {version!r}")

          mismatches = []
          for manifest in manifests:
              data = tomllib.loads(pathlib.Path(manifest).read_text())
              version = manifest_version(data)
              if version != tag:
                  mismatches.append(f"{manifest}: {version}")

          package_json = pathlib.Path("termui/frontend/package.json")
          package_data = json.loads(package_json.read_text())
          if package_data.get("version") != tag:
              mismatches.append(f"{package_json}: {package_data.get('version')}")

          package_lock = pathlib.Path("termui/frontend/package-lock.json")
          lock_data = json.loads(package_lock.read_text())
          if lock_data.get("version") != tag:
              mismatches.append(f"{package_lock}: {lock_data.get('version')}")
          root_package = lock_data.get("packages", {}).get("", {})
          if root_package.get("version") != tag:
              mismatches.append(f"{package_lock} packages['']: {root_package.get('version')}")

          if mismatches:
              raise SystemExit(
                  "tag/version mismatch:\n" + "\n".join(f"- {line}" for line in mismatches)
              )

          print(f"validated release tag {tag}")
          PY

      - name: Validate release notes
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          trap 'rm -f "$notes_file"' EXIT
          ./scripts/release-notes.sh "${GITHUB_REF_NAME}" > "$notes_file"
          placeholder_text="请在 scripts/release-notes.sh 中补充此版本的功能、修复和兼容性说明。"
          if ! grep -q "用户可见变化" "$notes_file"; then
            printf 'release notes for %s must include user-visible changes\n' "${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if grep -Fq "$placeholder_text" "$notes_file"; then
            printf 'release notes for %s still contain placeholder text\n' "${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  package:
    name: build ${{ matrix.asset_arch }} release binaries
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset_arch: arm64
    env:
      STATIC_TARGET: ${{ matrix.target }}
      ASSET_ARCH: ${{ matrix.asset_arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.STATIC_TARGET }}

      - name: Install static linker tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: termui/frontend/package-lock.json

      - name: Build embedded Web assets
        run: |
          set -euo pipefail
          cd termui/frontend
          npm ci
          npm run build

      - name: Build static release binaries
        run: |
          set -euo pipefail

          out_dir="dist/release"
          mkdir -p "$out_dir"

          assert_static_binary() {
            local binary_path="$1"
            local file_output
            file_output="$(file "$binary_path")"
            printf '%s\n' "$file_output"
            if ! printf '%s\n' "$file_output" | grep -Eq 'static-pie linked|statically linked'; then
              printf 'release binary is not statically linked: %s\n' "$binary_path" >&2
              exit 1
            fi
            if ldd "$binary_path" 2>&1 | grep -Eq '=>|ld-linux|libc\.so'; then
              printf 'release binary unexpectedly has dynamic dependencies: %s\n' "$binary_path" >&2
              exit 1
            fi
          }

          build_binary() {
            local package="$1"
            local binary="$2"
            cargo build --release --locked --target "$STATIC_TARGET" -p "$package" --bin "$binary"
            local binary_path="target/${STATIC_TARGET}/release/${binary}"
            strip "$binary_path"
            assert_static_binary "$binary_path"
            install -m 0755 "$binary_path" "$out_dir/${binary}-linux-${ASSET_ARCH}"
          }

          build_binary termd termd
          build_binary termrelay termrelay
          build_binary termctl termctl

          expected=(
            "termd-linux-${ASSET_ARCH}"
            "termctl-linux-${ASSET_ARCH}"
            "termrelay-linux-${ASSET_ARCH}"
          )
          mapfile -t actual < <(find "$out_dir" -maxdepth 1 -type f -printf '%f\n' | sort)
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          diff -u <(printf '%s\n' "${expected_sorted[@]}") <(printf '%s\n' "${actual[@]}")

          ls -lah "$out_dir"

      - name: Upload architecture binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ matrix.asset_arch }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish release binaries
    needs: [validate, package]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download architecture binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-binaries-*
          path: dist/release
          merge-multiple: true

      - name: Validate exact release asset set
        run: |
          set -euo pipefail
          expected=(
            termctl-linux-amd64
            termctl-linux-arm64
            termd-linux-amd64
            termd-linux-arm64
            termrelay-linux-amd64
            termrelay-linux-arm64
          )
          mapfile -t actual < <(find dist/release -maxdepth 1 -type f -printf '%f\n' | sort)
          diff -u <(printf '%s\n' "${expected[@]}") <(printf '%s\n' "${actual[@]}")
          if find dist/release -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.sh' -o -name 'checksums.txt' \) | grep -q .; then
            printf 'forbidden release asset generated\n' >&2
            exit 1
          fi

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          ./scripts/release-notes.sh "$tag" > "$notes_file"
          placeholder_text="请在 scripts/release-notes.sh 中补充此版本的功能、修复和兼容性说明。"
          if ! grep -q "用户可见变化" "$notes_file"; then
            printf 'release notes for %s must include user-visible changes\n' "$tag" >&2
            exit 1
          fi
          if grep -Fq "$placeholder_text" "$notes_file"; then
            printf 'release notes for %s still contain placeholder text\n' "$tag" >&2
            exit 1
          fi
          cd dist/release

          files=(
            termctl-linux-amd64
            termctl-linux-arm64
            termd-linux-amd64
            termd-linux-arm64
            termrelay-linux-amd64
            termrelay-linux-arm64
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            mapfile -t remote_assets < <(gh release view "$tag" --json assets --jq '.assets[].name')
            for asset in "${remote_assets[@]}"; do
              case " ${files[*]} " in
                *" ${asset} "*) ;;
                *) gh release delete-asset "$tag" "$asset" --yes ;;
              esac
            done
            gh release upload "$tag" "${files[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --notes-file "$notes_file"
          fi
          mapfile -t published < <(gh release view "$tag" --json assets --jq '.assets[].name' | sort)
          diff -u <(printf '%s\n' "${files[@]}" | sort) <(printf '%s\n' "${published[@]}")

  images:
    name: build and push images
    needs: [validate, publish]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: termd
            dockerfile: docker/termd.Dockerfile
          - component: termrelay
            dockerfile: docker/termrelay.Dockerfile
          - component: termctl
            dockerfile: docker/termctl.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: image_owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ steps.image_owner.outputs.value }}/${{ matrix.component }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

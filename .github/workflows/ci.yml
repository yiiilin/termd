name: ci

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  shell:
    name: shell syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Test installers
        run: sudo bash scripts/test-installers.sh

  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      - name: Build release binaries for musl
        run: cargo build --release --locked --target x86_64-unknown-linux-musl -p termd --bin termd -p termrelay --bin termrelay -p termctl --bin termctl

      - name: Run workspace tests
        run: cargo test --workspace --locked

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: termui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: termui/frontend

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: termui/frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: termui/frontend

      - name: Run tests
        run: npm test -- --run
        working-directory: termui/frontend

      - name: Build
        run: npm run build
        working-directory: termui/frontend

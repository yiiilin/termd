<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <title>termd logo</title>
  <defs>
    <clipPath id="win-clip">
      <rect x="20" y="46" width="230" height="170" rx="22"/>
    </clipPath>
  </defs>

  <!-- Shadow layer -->
  <rect x="46" y="66" width="230" height="170" rx="22" fill="#A7C080"/>

  <!-- Terminal window body -->
  <rect x="20" y="46" width="230" height="170" rx="22" fill="#1e1e22"/>

  <!-- Title bar clipped to window shape -->
  <rect x="20" y="46" width="230" height="34" fill="#2a2a30" clip-path="url(#win-clip)"/>

  <!-- Traffic lights -->
  <circle cx="48" cy="63" r="7" fill="#ff5f57"/>
  <circle cx="69" cy="63" r="7" fill="#febc2e"/>
  <circle cx="90" cy="63" r="7" fill="#28c840"/>

  <!-- Prompt -->
  <text x="36" y="148" font-family="'JetBrains Mono', Consolas, 'Courier New', monospace" font-size="48" font-weight="700" fill="white">&#62;_</text>

  <!-- Bottom accent bar -->
  <rect x="36" y="192" width="68" height="9" rx="4.5" fill="#A7C080"/>
</svg>
